<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница была сожрана "Пожирателем Богов"</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page-404">
        <!-- Летающие частицы -->
        <div class="particles-void" id="particlesVoid"></div>
        
        <!-- Световые полоски -->
        <div class="light-streaks" id="lightStreaks"></div>

        <!-- Энергетические кольца -->
        <div class="energy-rings" id="energyRings"></div>

        <!-- Мерцающие точки -->
        <div class="sparkles" id="sparkles"></div>

        <!-- Фоновые свечения -->
        <div class="void-glow void-glow--1"></div>
        <div class="void-glow void-glow--2"></div>
        <div class="void-glow void-glow--3"></div>

        <div class="page-404__content">
            <div class="page-404__number">404</div>
            <h1 class="page-404__title">
                <span class="title-icon">⬡</span> СТРАНИЦА СОЖРАНА <span class="title-icon">⬡</span>
            </h1>
            <p class="page-404__text">
                <span class="highlight">Пожиратель Богов</span> поглотил эту страницу. 
                Теперь она — часть космической пустоты. 
                Здесь ничего нет, только холод и тишина.
            </p>
            <div class="page-404__actions">
                <a href="index.html" class="btn--void">🌌 Вернуться на базу</a>
                <a href="contacts.html" class="btn--void btn--void-outline">⚔️ Бросить вызов</a>
            </div>
        </div>
    </main>

    <script>
        // ============================================
        // ЛЕТАЮЩИЕ ЧАСТИЦЫ
        // ============================================
        const particlesContainer = document.getElementById('particlesVoid');
        const particleTypes = [
            'void-particle--star',
            'void-particle--ring', 
            'void-particle--blue', 
            'void-particle--purple',
            'void-particle--bright'
        ];
        
        for (let i = 0; i < 60; i++) {
            const particle = document.createElement('div');
            const type = particleTypes[Math.floor(Math.random() * particleTypes.length)];
            const size = type === 'void-particle--ring' ? Math.random() * 5 + 3 : Math.random() * 3 + 1;
            
            particle.classList.add('void-particle', type);
            particle.style.cssText = `
                left: ${Math.random() * 100}%;
                --dur: ${Math.random() * 15 + 10}s;
                --drift: ${(Math.random() - 0.5) * 150}px;
                --drift-end: ${(Math.random() - 0.5) * 150}px;
                animation-delay: ${Math.random() * 15}s;
                width: ${size}px;
                height: ${size}px;
            `;
            particlesContainer.appendChild(particle);
        }

        // ============================================
        // СВЕТОВЫЕ ПОЛОСКИ
        // ============================================
        const streaksContainer = document.getElementById('lightStreaks');
        const streakTypes = ['light-streak--blue', 'light-streak--purple', 'light-streak--white'];
        
        for (let i = 0; i < 15; i++) {
            const streak = document.createElement('div');
            const type = streakTypes[Math.floor(Math.random() * streakTypes.length)];
            
            streak.classList.add('light-streak', type);
            streak.style.cssText = `
                left: ${Math.random() * 100}%;
                --dur: ${Math.random() * 10 + 8}s;
                --delay: ${Math.random() * 12}s;
                height: ${Math.random() * 80 + 40}px;
            `;
            streaksContainer.appendChild(streak);
        }

        // ============================================
        // ЭНЕРГЕТИЧЕСКИЕ КОЛЬЦА
        // ============================================
        const ringsContainer = document.getElementById('energyRings');
        const ringTypes = ['energy-ring--blue', 'energy-ring--purple'];
        
        for (let i = 0; i < 8; i++) {
            const ring = document.createElement('div');
            const type = ringTypes[Math.floor(Math.random() * ringTypes.length)];
            
            ring.classList.add('energy-ring', type);
            ring.style.cssText = `
                left: ${Math.random() * 80 + 10}%;
                top: ${Math.random() * 80 + 10}%;
                --dur: ${Math.random() * 8 + 6}s;
                --delay: ${Math.random() * 10}s;
            `;
            ringsContainer.appendChild(ring);
        }

        // ============================================
        // МЕРЦАЮЩИЕ ТОЧКИ
        // ============================================
        const sparklesContainer = document.getElementById('sparkles');
        
        for (let i = 0; i < 40; i++) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.cssText = `
                top: ${Math.random() * 100}%;
                left: ${Math.random() * 100}%;
                --dur: ${Math.random() * 4 + 2}s;
                --delay: ${Math.random() * 5}s;
            `;
            sparklesContainer.appendChild(sparkle);
        }
    </script>
</body>
</html>
